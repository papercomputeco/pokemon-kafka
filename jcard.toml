# jcard.toml — stereOS VM configuration for Pokemon Agent

mixtape = "opencode-mixtape:latest"

name = "pokemon-agent"

[resources]
cpus   = 4
memory = "8GiB"
disk   = "30GiB"

[network]
mode = "nat"

# Uncomment for LLM-powered strategy:
# mode = "nat"
# egress_allow = ["api.anthropic.com"]

[[shared]]
host = "./"
guest = "/workspace"
readonly = false

[env]
ANTHROPIC_API_BASE = "http://localhost:8080"

[secrets]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"

[agent]
harness = "claude-code"
prompt = "cd /workspace && bash scripts/install.sh && export LD_LIBRARY_PATH=$HOME/.nix-profile/lib:$LD_LIBRARY_PATH && export PATH=/usr/local/bin:$PATH && docker compose up -d kafka && sleep 10 && tapes serve proxy --config-dir /workspace/.tapes --sqlite /workspace/.tapes/tapes.sqlite --kafka-brokers localhost:9092 --kafka-topic agent.telemetry.raw & sleep 2 && docker compose up -d && ~/venv/bin/python3 scripts/agent.py rom/pokemon_red.gb --strategy heuristic --max-turns 500000"
workdir = "/workspace"
restart = "no"
